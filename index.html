<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Platform - Launcher</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F5F5F0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border: 4px solid #141414; box-shadow: 8px 8px 0px 0px #141414; text-align: center; max-width: 400px; width: 100%; }
        h1 { margin-bottom: 1.5rem; color: #141414; font-weight: 800; }
        .btn { display: block; padding: 1rem; margin: 10px 0; background: #141414; color: white; text-decoration: none; font-weight: 700; border: 2px solid #141414; transition: all 0.2s; }
        .btn:hover { background: white; color: #141414; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px 0px #141414; }
        .btn-student { background: #FFD600; color: #141414; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Quiz Platform</h1>
        <p>Select a portal to continue:</p>
        <a href="/student/" class="btn btn-student">Student Portal</a>
        <a href="/admin/" class="btn">Admin Portal</a>
    </div>
</body>
</html>
